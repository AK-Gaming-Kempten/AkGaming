<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AKG Identity | Login</title>
  <link rel="icon" type="image/png" href="/ui/AkGaming_Identity.png" />
  <link rel="stylesheet" href="/ui/akgaming-base-theme.css" />
  <link rel="stylesheet" href="/ui/baseStyles.css" />
  <link rel="stylesheet" href="/ui/styles.css" />
  <script src="/ui/common.js" defer></script>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <select class="theme-picker" data-theme-picker aria-label="Theme">
        <option value="system">System Theme</option>
        <option value="light">Light Theme</option>
        <option value="dark">Dark Theme</option>
      </select>
    </div>
    <div class="brand">
      <img src="/ui/AkGaming_Identity.png" alt="AK Gaming" />
      <div class="brand-title">AK Gaming <span class="identity">Identity</span></div>
    </div>
    <h1>Welcome Back</h1>
    <p class="sub">Sign in with email/password or Discord.</p>

    <section id="redirect-account-choice" class="redirect-choice" hidden>
      <p class="sub redirect-choice-sub">You are already signed in to AK Gaming Identity.</p>
      <div class="redirect-choice-account">Current account: <strong id="current-account-label">your current account</strong></div>
      <button id="continue-current-account" class="primary" type="button">Continue with this account</button>
      <button id="use-different-account" class="secondary" type="button">Use a different account</button>
    </section>

    <div id="login-actions">
      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button class="primary" type="submit">Sign In</button>
      </form>

      <a id="discord-start-link" class="button secondary" href="/auth/discord/start">
        <img class="button-icon" src="/ui/Discord-Symbol-Blurple.svg" alt="" />
        Continue with Discord
      </a>
      <a id="switch-to-register-link" class="switch" href="/register">No account yet? Create one</a>
    </div>
    <div id="verification-help" hidden>
      <button class="secondary" id="resend-verification" type="button">Resend verification email</button>
    </div>
    <div class="status" id="status"></div>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const loginActionsEl = document.getElementById("login-actions");
    const redirectAccountChoiceEl = document.getElementById("redirect-account-choice");
    const currentAccountLabelEl = document.getElementById("current-account-label");
    const continueCurrentAccountBtn = document.getElementById("continue-current-account");
    const useDifferentAccountBtn = document.getElementById("use-different-account");
    const discordStartLinkEl = document.getElementById("discord-start-link");
    const switchToRegisterLinkEl = document.getElementById("switch-to-register-link");
    const verificationHelpEl = document.getElementById("verification-help");
    const resendVerificationBtn = document.getElementById("resend-verification");
    const statusEl = document.getElementById("status");
    let pendingVerificationEmail = null;
    let pendingRedirectPayload = null;

    function setStatus(msg, ok = false) {
      statusEl.textContent = msg;
      statusEl.className = `status ${ok ? "ok" : "error"}`;
    }

    function hideVerificationHelp() {
      pendingVerificationEmail = null;
      verificationHelpEl.hidden = true;
    }

    function showVerificationHelp(email) {
      pendingVerificationEmail = email;
      verificationHelpEl.hidden = false;
    }

    function saveTokens(payload) {
      localStorage.setItem("accessToken", payload.accessToken);
      localStorage.setItem("refreshToken", payload.refreshToken);
      localStorage.setItem("accessTokenExpiresAtUtc", payload.accessTokenExpiresAtUtc);
    }

    function clearTokens() {
      localStorage.removeItem("accessToken");
      localStorage.removeItem("refreshToken");
      localStorage.removeItem("accessTokenExpiresAtUtc");
    }

    function configureDiscordStartLink() {
      const params = new URLSearchParams(window.location.search);
      const redirectUri = params.get("redirect_uri");
      const state = params.get("state");
      const target = new URL("/auth/discord/start", window.location.origin);

      if (redirectUri) {
        target.searchParams.set("redirect_uri", redirectUri);
      }

      if (state) {
        target.searchParams.set("state", state);
      }

      discordStartLinkEl.href = `${target.pathname}${target.search}`;
    }

    function configureSwitchToRegisterLink() {
      const currentSearch = window.location.search || "";
      switchToRegisterLinkEl.href = `/register${currentSearch}`;
    }

    async function getCurrentUser(accessToken) {
      const response = await fetch("/auth/me", {
        headers: { Authorization: `Bearer ${accessToken}` }
      });

      if (!response.ok) {
        return null;
      }

      return await response.json().catch(() => null);
    }

    function isTokenExpiring(expiresAtUtc, withinSeconds = 30) {
      if (!expiresAtUtc) {
        return true;
      }

      const expiresAtMs = Date.parse(expiresAtUtc);
      if (Number.isNaN(expiresAtMs)) {
        return true;
      }

      return (expiresAtMs - Date.now()) <= withinSeconds * 1000;
    }

    async function tryRefreshSession() {
      const refreshToken = localStorage.getItem("refreshToken");
      if (!refreshToken) {
        return null;
      }

      const response = await fetch("/auth/refresh", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refreshToken })
      });

      if (!response.ok) {
        return null;
      }

      const payload = await response.json();
      saveTokens(payload);
      return payload;
    }

    async function resolveActiveSessionForRedirect(initialPayload) {
      let payload = initialPayload || {
        accessToken: localStorage.getItem("accessToken"),
        refreshToken: localStorage.getItem("refreshToken"),
        accessTokenExpiresAtUtc: localStorage.getItem("accessTokenExpiresAtUtc")
      };

      if (!payload.accessToken || !payload.refreshToken) {
        return null;
      }

      if (isTokenExpiring(payload.accessTokenExpiresAtUtc)) {
        const refreshed = await tryRefreshSession();
        if (refreshed) {
          payload = refreshed;
        }
      }

      let user = await getCurrentUser(payload.accessToken).catch(() => null);
      if (!user) {
        const refreshed = await tryRefreshSession();
        if (!refreshed) {
          return null;
        }

        payload = refreshed;
        user = await getCurrentUser(payload.accessToken).catch(() => null);
        if (!user) {
          return null;
        }
      }

      return { payload, user };
    }

    async function completeExternalRedirect(payload) {
      const params = new URLSearchParams(window.location.search);
      const redirectUri = params.get("redirect_uri");
      const state = params.get("state");
      if (!redirectUri) {
        return false;
      }

      const response = await fetch("/auth/redirect/finalize", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          redirectUri,
          state,
          accessToken: payload.accessToken,
          refreshToken: payload.refreshToken,
          accessTokenExpiresAtUtc: payload.accessTokenExpiresAtUtc
        })
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        setStatus(error.detail || "Could not redirect back to the application.");
        return true;
      }

      const body = await response.json();
      window.location.href = body.redirectUrl;
      return true;
    }

    function showRedirectAccountChoice(email) {
      currentAccountLabelEl.textContent = email || "your current account";
      loginActionsEl.hidden = true;
      redirectAccountChoiceEl.hidden = false;
    }

    async function prepareRedirectSessionChoice() {
      const params = new URLSearchParams(window.location.search);
      if (!params.get("redirect_uri")) {
        return;
      }

      const session = await resolveActiveSessionForRedirect();
      if (!session) {
        pendingRedirectPayload = null;
        clearTokens();
        return;
      }

      pendingRedirectPayload = session.payload;
      showRedirectAccountChoice(session.user.email || null);
    }

    continueCurrentAccountBtn.addEventListener("click", async () => {
      if (!pendingRedirectPayload) {
        return;
      }

      statusEl.className = "status";
      statusEl.textContent = "Continuing with current account...";

      const session = await resolveActiveSessionForRedirect(pendingRedirectPayload);
      if (!session) {
        pendingRedirectPayload = null;
        clearTokens();
        redirectAccountChoiceEl.hidden = true;
        loginActionsEl.hidden = false;
        setStatus("Your session has expired. Please sign in again.");
        return;
      }

      pendingRedirectPayload = session.payload;
      await completeExternalRedirect(session.payload);
    });

    useDifferentAccountBtn.addEventListener("click", () => {
      pendingRedirectPayload = null;
      redirectAccountChoiceEl.hidden = true;
      loginActionsEl.hidden = false;
      hideVerificationHelp();
      statusEl.className = "status";
      statusEl.textContent = "Please sign in with a different account.";
      form.email.focus();
    });

    resendVerificationBtn.addEventListener("click", async () => {
      if (!pendingVerificationEmail) {
        setStatus("Enter your account email and try again.");
        return;
      }

      statusEl.className = "status";
      statusEl.textContent = "Requesting verification email...";

      const response = await fetch("/auth/email/send-verification", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: pendingVerificationEmail })
      });

      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        setStatus(body.detail || "Could not send verification email.");
        return;
      }

      setStatus(body.message || "If the account exists, a verification email has been sent.", true);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideVerificationHelp();
      statusEl.className = "status";
      statusEl.textContent = "Signing in...";

      const body = {
        email: form.email.value.trim(),
        password: form.password.value
      };

      const response = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        if (response.status === 403 && (error.detail || "").toLowerCase().includes("email verification is required")) {
          showVerificationHelp(body.email);
        }
        setStatus(error.detail || "Login failed.");
        return;
      }

      const payload = await response.json();
      saveTokens(payload);
      setStatus("Login successful.", true);

      const redirectedExternally = await completeExternalRedirect(payload);
      if (redirectedExternally) {
        return;
      }

      const returnUrl = new URLSearchParams(window.location.search).get("returnUrl");
      if (returnUrl && returnUrl.startsWith("/")) {
        window.location.href = returnUrl;
        return;
      }

      window.location.href = "/";
    });

    configureDiscordStartLink();
    configureSwitchToRegisterLink();
    prepareRedirectSessionChoice().catch(() => undefined);
  </script>
</body>
</html>
