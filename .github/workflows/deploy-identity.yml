name: Deploy Identity

on:
  push:
    branches: ["main"]
    tags: ["identity-publish"]
    paths:
      - "AkGaming.Identity/**"
      - "AkGaming.Core/**"

concurrency:
  group: deploy-identity-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-test:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      IDENTITY_TEST_DB_CONNECTION_STRING: ${{ secrets.IDENTITY_TEST_DB_CONNECTION_STRING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.*
      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Apply Test Database Migrations
        if: ${{ env.IDENTITY_TEST_DB_CONNECTION_STRING != '' }}
        env:
          DOTNET_CLI_HOME: /tmp
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          ConnectionStrings__IdentityDb: ${{ env.IDENTITY_TEST_DB_CONNECTION_STRING }}
        run: dotnet ef database update --project AkGaming.Identity/Migrations/Postgres/AkGaming.Identity.Migrations.Postgres.csproj --context AuthDbContext
      - name: Trigger Coolify Test Deploy
        run: |
          curl --fail --request GET "${{ secrets.COOLIFY_WEBHOOK_IDENTITY_TEST }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
  deploy-production:
    if: github.ref == 'refs/tags/identity-publish'
    runs-on: ubuntu-latest
    env:
      IDENTITY_PRODUCTION_DB_CONNECTION_STRING: ${{ secrets.IDENTITY_PRODUCTION_DB_CONNECTION_STRING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.*
      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Apply Production Database Migrations
        if: ${{ env.IDENTITY_PRODUCTION_DB_CONNECTION_STRING != '' }}
        env:
          DOTNET_CLI_HOME: /tmp
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          ConnectionStrings__IdentityDb: ${{ env.IDENTITY_PRODUCTION_DB_CONNECTION_STRING }}
        run: dotnet ef database update --project AkGaming.Identity/Migrations/Postgres/AkGaming.Identity.Migrations.Postgres.csproj --context AuthDbContext
      - name: Trigger Coolify Production Deploy
        run: |
          curl --fail --request GET "${{ secrets.COOLIFY_WEBHOOK_IDENTITY }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
