name: Deploy Website

on:
  push:
    branches: ["main", "prod-website"]

concurrency:
  group: deploy-website-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  should-deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.evaluate.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Evaluate Website Deploy Trigger
        id: evaluate
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -eu

          zero_sha="0000000000000000000000000000000000000000"
          if [ "$BEFORE_SHA" = "$zero_sha" ]; then
            changed_files="$(git show --pretty='' --name-only "$CURRENT_SHA")"
            commit_messages="$(git log --format=%B -n 1 "$CURRENT_SHA")"
          else
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
            commit_messages="$(git log --format=%B "$BEFORE_SHA..$CURRENT_SHA")"
          fi

          deploy=false

          if printf '%s\n' "$changed_files" | grep -Eq '^(AkGaming\.Website/|AkGaming\.Core/)'; then
            deploy=true
          fi

          if printf '%s\n' "$commit_messages" | grep -Eiq '\[[^]]*(Website|All Projects|Core)[^]]*\]'; then
            deploy=true
          fi

          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"

  deploy-test:
    needs: should-deploy
    if: github.ref == 'refs/heads/main' && needs.should-deploy.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Test Deploy
        run: |
          curl --fail --request GET "${{ secrets.COOLIFY_WEBHOOK_WEBSITE_TEST }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
  deploy-production:
    if: github.ref == 'refs/heads/prod-website'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Production Deploy
        run: |
          curl --fail --request GET "${{ secrets.COOLIFY_WEBHOOK_WEBSITE }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
