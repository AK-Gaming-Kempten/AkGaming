name: Deploy Management

on:
  push:
    branches: ["main"]
    paths:
      - "AkGaming.Management/**"
      - "AkGaming.Core/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy for Backend
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_MANAGEMENT_BACKEND }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
      - name: Trigger Coolify Deploy for Frontend
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_MANAGEMENT_FRONTEND }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
