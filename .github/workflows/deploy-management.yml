name: Deploy Management

on:
  push:
    branches: ["main"]
    tags: ["management-publish"]
    paths:
      - "AkGaming.Management/**"
      - "AkGaming.Core/**"

concurrency:
  group: deploy-management-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-test:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      MANAGEMENT_TEST_DB_CONNECTION_STRING: ${{ secrets.MANAGEMENT_TEST_DB_CONNECTION_STRING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.*
      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Apply Test Database Migrations
        if: ${{ env.MANAGEMENT_TEST_DB_CONNECTION_STRING != '' }}
        env:
          DOTNET_CLI_HOME: /tmp
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          ConnectionStrings__DefaultConnection: ${{ env.MANAGEMENT_TEST_DB_CONNECTION_STRING }}
        run: dotnet ef database update --project AkGaming.Management/Modules/MemberManagement/Migrations/Postgres/AkGaming.Management.Modules.MemberManagement.Migrations.Postgres.csproj --context MemberManagementDbContext
      - name: Trigger Coolify Test Deploy for Backend
        run: |
          curl --fail --request GET "${{ secrets.COOLIFY_WEBHOOK_MANAGEMENT_BACKEND_TEST }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
      - name: Trigger Coolify Test Deploy for Frontend
        run: |
          curl --fail --request GET "${{ secrets.COOLIFY_WEBHOOK_MANAGEMENT_FRONTEND_TEST }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
  deploy-production:
    if: github.ref == 'refs/tags/management-publish'
    runs-on: ubuntu-latest
    env:
      MANAGEMENT_PRODUCTION_DB_CONNECTION_STRING: ${{ secrets.MANAGEMENT_PRODUCTION_DB_CONNECTION_STRING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.*
      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Apply Production Database Migrations
        if: ${{ env.MANAGEMENT_PRODUCTION_DB_CONNECTION_STRING != '' }}
        env:
          DOTNET_CLI_HOME: /tmp
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          ConnectionStrings__DefaultConnection: ${{ env.MANAGEMENT_PRODUCTION_DB_CONNECTION_STRING }}
        run: dotnet ef database update --project AkGaming.Management/Modules/MemberManagement/Migrations/Postgres/AkGaming.Management.Modules.MemberManagement.Migrations.Postgres.csproj --context MemberManagementDbContext
      - name: Trigger Coolify Production Deploy for Backend
        run: |
          curl --fail --request GET "${{ secrets.COOLIFY_WEBHOOK_MANAGEMENT_BACKEND }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
      - name: Trigger Coolify Production Deploy for Frontend
        run: |
          curl --fail --request GET "${{ secrets.COOLIFY_WEBHOOK_MANAGEMENT_FRONTEND }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
