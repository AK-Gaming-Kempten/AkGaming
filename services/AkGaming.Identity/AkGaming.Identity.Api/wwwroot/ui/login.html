<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AKG Identity | Login</title>
  <link rel="icon" type="image/png" href="/ui/AkGaming_Identity.png" />
  <link rel="stylesheet" href="/ui/theme.css" />
  <link rel="stylesheet" href="/ui/baseStyles.css" />
  <link rel="stylesheet" href="/ui/styles.css" />
  <script src="/ui/common.js" defer></script>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <select class="theme-picker" data-theme-picker aria-label="Theme">
        <option value="system">System Theme</option>
        <option value="light">Light Theme</option>
        <option value="dark">Dark Theme</option>
      </select>
    </div>
    <div class="brand">
      <img src="/ui/AkGaming_Identity.png" alt="AK Gaming" />
      <div class="brand-title">AK Gaming <span class="identity">Identity</span></div>
    </div>
    <h1>Welcome Back</h1>
    <p class="sub">Sign in with email/password or Discord.</p>

    <section id="redirect-account-choice" class="redirect-choice" hidden>
      <p class="sub redirect-choice-sub">You are already signed in to AK Gaming Identity.</p>
      <div class="redirect-choice-account">Current account: <strong id="current-account-label">your current account</strong></div>
      <button id="continue-current-account" class="primary" type="button">Continue with this account</button>
      <button id="use-different-account" class="secondary" type="button">Use a different account</button>
    </section>

    <div id="login-actions">
      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button class="primary" type="submit">Sign In</button>
      </form>

      <a class="button secondary" href="/auth/discord/start">
        <img class="button-icon" src="/ui/Discord-Symbol-Blurple.svg" alt="" />
        Continue with Discord
      </a>
      <a class="switch" href="/register">No account yet? Create one</a>
    </div>
    <div class="status" id="status"></div>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const loginActionsEl = document.getElementById("login-actions");
    const redirectAccountChoiceEl = document.getElementById("redirect-account-choice");
    const currentAccountLabelEl = document.getElementById("current-account-label");
    const continueCurrentAccountBtn = document.getElementById("continue-current-account");
    const useDifferentAccountBtn = document.getElementById("use-different-account");
    const statusEl = document.getElementById("status");
    let pendingRedirectPayload = null;

    function setStatus(msg, ok = false) {
      statusEl.textContent = msg;
      statusEl.className = `status ${ok ? "ok" : "error"}`;
    }

    function saveTokens(payload) {
      localStorage.setItem("accessToken", payload.accessToken);
      localStorage.setItem("refreshToken", payload.refreshToken);
      localStorage.setItem("accessTokenExpiresAtUtc", payload.accessTokenExpiresAtUtc);
    }

    async function getCurrentUserEmail(accessToken) {
      const response = await fetch("/auth/me", {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (!response.ok) {
        return null;
      }

      const payload = await response.json().catch(() => null);
      return payload && payload.email ? payload.email : null;
    }

    async function tryRefreshSession() {
      const refreshToken = localStorage.getItem("refreshToken");
      if (!refreshToken) {
        return null;
      }

      const response = await fetch("/auth/refresh", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refreshToken })
      });

      if (!response.ok) {
        return null;
      }

      const payload = await response.json();
      saveTokens(payload);
      return payload;
    }

    async function completeExternalRedirect(payload) {
      const params = new URLSearchParams(window.location.search);
      const redirectUri = params.get("redirect_uri");
      const state = params.get("state");
      if (!redirectUri) {
        return false;
      }

      const response = await fetch("/auth/redirect/finalize", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          redirectUri,
          state,
          accessToken: payload.accessToken,
          refreshToken: payload.refreshToken,
          accessTokenExpiresAtUtc: payload.accessTokenExpiresAtUtc
        })
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        setStatus(error.detail || "Could not redirect back to the application.");
        return true;
      }

      const body = await response.json();
      window.location.href = body.redirectUrl;
      return true;
    }

    function showRedirectAccountChoice(email) {
      currentAccountLabelEl.textContent = email || "your current account";
      loginActionsEl.hidden = true;
      redirectAccountChoiceEl.hidden = false;
    }

    async function prepareRedirectSessionChoice() {
      const params = new URLSearchParams(window.location.search);
      if (!params.get("redirect_uri")) {
        return;
      }

      const accessToken = localStorage.getItem("accessToken");
      const refreshToken = localStorage.getItem("refreshToken");
      if (!accessToken || !refreshToken) {
        return;
      }

      let payload = {
        accessToken,
        refreshToken,
        accessTokenExpiresAtUtc: localStorage.getItem("accessTokenExpiresAtUtc") || new Date().toISOString()
      };

      const refreshed = await tryRefreshSession();
      if (refreshed) {
        payload = refreshed;
      }

      pendingRedirectPayload = payload;
      const email = await getCurrentUserEmail(payload.accessToken).catch(() => null);
      showRedirectAccountChoice(email);
    }

    continueCurrentAccountBtn.addEventListener("click", async () => {
      if (!pendingRedirectPayload) {
        return;
      }

      statusEl.className = "status";
      statusEl.textContent = "Continuing with current account...";
      await completeExternalRedirect(pendingRedirectPayload);
    });

    useDifferentAccountBtn.addEventListener("click", () => {
      pendingRedirectPayload = null;
      redirectAccountChoiceEl.hidden = true;
      loginActionsEl.hidden = false;
      statusEl.className = "status";
      statusEl.textContent = "Please sign in with a different account.";
      form.email.focus();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.className = "status";
      statusEl.textContent = "Signing in...";

      const body = {
        email: form.email.value.trim(),
        password: form.password.value
      };

      const response = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        setStatus(error.detail || "Login failed.");
        return;
      }

      const payload = await response.json();
      saveTokens(payload);
      setStatus("Login successful.", true);

      const redirectedExternally = await completeExternalRedirect(payload);
      if (redirectedExternally) {
        return;
      }

      const returnUrl = new URLSearchParams(window.location.search).get("returnUrl");
      if (returnUrl && returnUrl.startsWith("/")) {
        window.location.href = returnUrl;
        return;
      }

      window.location.href = "/";
    });

    prepareRedirectSessionChoice().catch(() => undefined);
  </script>
</body>
</html>
