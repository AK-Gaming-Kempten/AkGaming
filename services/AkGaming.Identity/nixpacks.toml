[variables]
NIXPACKS_CSHARP_SDK_VERSION = "10.0.101"

[phases.install]
cmds = ["dotnet restore AkGaming.Identity.sln"]

[phases.build]
cmds = ["dotnet publish AkGaming.Identity.Api/AkGaming.Identity.Api.csproj -c Release -o /app/out --no-restore"]

[start]
cmd = "dotnet /app/out/AkGaming.Identity.Api.dll"
