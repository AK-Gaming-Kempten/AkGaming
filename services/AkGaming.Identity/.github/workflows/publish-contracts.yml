name: Publish Contracts

on:
  workflow_dispatch:
  push:
    tags:
      - "contracts-v*"

permissions:
  contents: read

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AkGaming.Identity.Contracts/AkGaming.Identity.Contracts.csproj

      - name: Compute package version from tag
        if: startsWith(github.ref, 'refs/tags/contracts-v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#contracts-v}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Pack
        shell: bash
        run: |
          mkdir -p artifacts
          if [ -n "${PACKAGE_VERSION:-}" ]; then
            dotnet pack AkGaming.Identity.Contracts/AkGaming.Identity.Contracts.csproj -c Release -o artifacts -p:Version="$PACKAGE_VERSION"
          else
            dotnet pack AkGaming.Identity.Contracts/AkGaming.Identity.Contracts.csproj -c Release -o artifacts
          fi

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/contracts-v')
        shell: bash
        run: |
          dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "artifacts/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: contracts-packages
          path: artifacts/*
